<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engagement Planner Afiq x Fifi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Library untuk PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@500;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #FDFBF7; }
        .font-mono { font-family: 'JetBrains+Mono', monospace; }
        .category-card { transition: all 0.3s ease; }
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        
        /* Custom styling for editable header inputs */
        .header-input {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 9999px;
            padding: 2px 12px;
            color: white;
            font-size: 12px;
            outline: none;
            transition: all 0.2s;
        }
        .header-input:focus {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
        }
        .header-input::placeholder { color: rgba(255, 255, 255, 0.5); }

        /* Gaya khusus untuk PDF */
        .pdf-mode .no-print { display: none !important; }
        .pdf-mode .pdf-only { display: block !important; }
        .pdf-only { display: none; }
    </style>
</head>
<body class="pb-32">
    <!-- Header -->
    <header class="bg-[#1E3A8A] text-white pt-10 pb-24 px-6 rounded-b-[40px] shadow-xl relative overflow-hidden text-center">
        <div class="absolute top-0 right-0 w-64 h-64 bg-blue-400/10 rounded-full -mr-20 -mt-20 blur-3xl"></div>
        
        <div class="max-w-2xl mx-auto relative z-10">
            <div id="sync-status" class="flex justify-center mb-4 min-h-[24px] text-[10px] uppercase font-bold tracking-widest text-blue-100/50 no-print">
                <i data-lucide="database" class="w-3 h-3 mr-2"></i> Simpanan Tempatan Aktif
            </div>

            <div class="inline-flex items-center justify-center p-3 bg-white/10 backdrop-blur-md rounded-full mb-4 border border-white/20">
                <i data-lucide="heart" class="text-pink-400 fill-pink-400 w-6 h-6"></i>
            </div>
            <h1 class="text-3xl font-extrabold tracking-tight mb-2 uppercase italic">Tunang Afiq & Fifi</h1>
            
            <!-- Countdown Display -->
            <div id="countdown-container" class="mb-6 flex justify-center gap-2">
                <div class="bg-white/10 backdrop-blur-sm rounded-xl p-2 min-w-[60px] border border-white/10">
                    <div id="cd-days" class="text-xl font-black font-mono leading-none">00</div>
                    <div class="text-[8px] uppercase font-bold opacity-60">Hari</div>
                </div>
                <div class="bg-white/10 backdrop-blur-sm rounded-xl p-2 min-w-[60px] border border-white/10">
                    <div id="cd-hours" class="text-xl font-black font-mono leading-none">00</div>
                    <div class="text-[8px] uppercase font-bold opacity-60">Jam</div>
                </div>
                <div class="bg-white/10 backdrop-blur-sm rounded-xl p-2 min-w-[60px] border border-white/10">
                    <div id="cd-mins" class="text-xl font-black font-mono leading-none">00</div>
                    <div class="text-[8px] uppercase font-bold opacity-60">Min</div>
                </div>
                <div class="bg-white/10 backdrop-blur-sm rounded-xl p-2 min-w-[60px] border border-white/10">
                    <div id="cd-secs" class="text-xl font-black font-mono leading-none text-pink-300">00</div>
                    <div class="text-[8px] uppercase font-bold opacity-60 text-pink-300">Saat</div>
                </div>
            </div>

            <!-- Editable Event Info -->
            <div class="flex flex-wrap justify-center gap-2 mb-6">
                <div class="flex flex-col items-center">
                    <span class="text-[8px] uppercase font-bold opacity-50 mb-1">Tarikh</span>
                    <input type="date" id="event-date" onchange="updateEventInfo('date', this.value)" class="header-input">
                </div>
                <div class="flex flex-col items-center">
                    <span class="text-[8px] uppercase font-bold opacity-50 mb-1">Tetamu</span>
                    <input type="number" id="event-pax" placeholder="Pax" onchange="updateEventInfo('pax', this.value)" class="header-input w-20">
                </div>
                <div class="flex flex-col items-center">
                    <span class="text-[8px] uppercase font-bold opacity-50 mb-1">Warna Tema</span>
                    <input type="text" id="event-theme" placeholder="Tema" onchange="updateEventInfo('theme', this.value)" class="header-input w-24">
                </div>
                <div class="flex flex-col items-center">
                    <span class="text-[8px] uppercase font-bold opacity-50 mb-1">Pelamin</span>
                    <input type="text" id="event-dais" placeholder="Pelamin" onchange="updateEventInfo('dais', this.value)" class="header-input w-28">
                </div>
            </div>

            <button onclick="downloadPDF()" class="no-print inline-flex items-center gap-2 bg-white text-[#1E3A8A] px-5 py-2 rounded-full font-bold text-sm shadow-lg hover:bg-blue-50 transition-all active:scale-95">
                <i data-lucide="download" class="w-4 h-4"></i> Muat Turun Senarai (PDF)
            </button>
        </div>
    </header>

    <main id="main-content" class="max-w-2xl mx-auto px-4 -mt-12 relative z-20">
        <!-- Stats Card -->
        <div class="bg-white rounded-3xl shadow-xl p-6 border border-slate-100 flex flex-col md:flex-row gap-6 items-center mb-10">
            <div class="flex-1 text-center md:text-left">
                <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest mb-1">Anggaran Keseluruhan</p>
                <h3 id="grand-total" class="text-4xl font-black text-slate-800 font-mono text-blue-900">RM 0.00</h3>
            </div>
            <div class="h-12 w-px bg-slate-100 hidden md:block no-print"></div>
            <div class="flex gap-4">
                <div class="text-center">
                    <div class="w-12 h-12 rounded-xl bg-blue-50 flex items-center justify-center text-blue-600 mb-1 border border-blue-100">
                        <i data-lucide="calculator" class="w-5 h-5"></i>
                    </div>
                    <p class="text-[9px] font-bold text-slate-400 uppercase">Items</p>
                    <p id="total-items" class="font-bold text-slate-700">0</p>
                </div>
                <div class="text-center">
                    <div class="w-12 h-12 rounded-xl bg-green-50 flex items-center justify-center text-green-600 mb-1 border border-green-100">
                        <i data-lucide="check-circle-2" class="w-5 h-5"></i>
                    </div>
                    <p class="text-[9px] font-bold text-slate-400 uppercase">Siap</p>
                    <p id="completed-items" class="font-bold text-slate-700">0</p>
                </div>
            </div>
        </div>

        <div id="categories-container"></div>

        <div class="text-center py-10 opacity-50 no-print">
           <p class="text-xs uppercase tracking-[0.2em] font-bold mb-1">Engagement Planner Pro</p>
           <p class="text-[10px]">Semua data disimpan secara automatik dalam pelayar anda</p>
           <button onclick="resetData()" class="mt-4 text-[10px] text-red-400 hover:text-red-600 underline">Padam & Reset Senarai</button>
        </div>
    </main>

    <!-- Floating Action Bar -->
    <div class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] max-w-md bg-[#1E3A8A] text-white py-4 px-6 rounded-2xl shadow-2xl flex justify-between items-center z-50 border border-white/20 backdrop-blur-md no-print">
        <div class="flex flex-col">
            <span class="text-[10px] uppercase font-bold opacity-60">Ringkasan</span>
            <span id="floating-total" class="text-lg font-mono font-bold leading-none">RM 0</span>
        </div>
        <div class="flex items-center gap-4">
            <div class="text-right">
                <span class="text-[10px] uppercase font-bold opacity-60">Progress</span>
                <p id="floating-progress" class="text-md font-bold leading-none">0%</p>
            </div>
            <div class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center border border-white/20">
                <i data-lucide="wallet" class="w-5 h-5"></i>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'engagement_planner_afiq_fifi_v3';

        const INITIAL_STATE = {
            eventInfo: {
                date: '2027-01-01',
                pax: 50,
                theme: 'Biru',
                dais: 'Putih Cream'
            },
            fifiClothes: [
                { id: 1, name: "Baju Kurung", price: 0, completed: false },
                { id: 2, name: "Veil", price: 0, completed: false },
                { id: 3, name: "Tudung", price: 0, completed: false },
                { id: 4, name: "Heels", price: 0, completed: false },
                { id: 5, name: "Headpiece", price: 0, completed: false },
                { id: 6, name: "Fake Nails + Glue", price: 0, completed: false },
                { id: 7, name: "Inai Putih", price: 0, completed: false },
                { id: 8, name: "Portable Fan", price: 0, completed: false },
                { id: 9, name: "Bunga Tangan", price: 0, completed: false },
                { id: 10, name: "MUA", price: 0, completed: false },
                { id: 11, name: "Hijab Stylist", price: 0, completed: false },
            ],
            fifiDulang: [
                { id: 12, name: "Cincin", price: 0, completed: false },
                { id: 13, name: "Kek 1", price: 0, completed: false },
                { id: 14, name: "Kek 2", price: 0, completed: false },
                { id: 15, name: "Beryls Choc", price: 0, completed: false },
                { id: 16, name: "Beg & Tali Pinggang", price: 0, completed: false },
                { id: 17, name: "Sejadah", price: 0, completed: false },
                { id: 18, name: "Tasbih", price: 0, completed: false },
                { id: 19, name: "Set Kahf", price: 0, completed: false },
                { id: 20, name: "Set Dulang", price: 0, completed: false },
                { id: 21, name: "Bekas Cincin 1", price: 0, completed: false },
                { id: 22, name: "Bekas Cincin 2", price: 0, completed: false },
            ],
            afiqClothes: [
                { id: 23, name: "Kurta", price: 0, completed: false },
                { id: 24, name: "Samping Putih", price: 0, completed: false },
                { id: 25, name: "Seluar Slack", price: 0, completed: false },
                { id: 26, name: "Kasut Hitam", price: 0, completed: false },
                { id: 27, name: "Stokin Hitam", price: 0, completed: false },
            ],
            afiqDulang: [
                { id: 28, name: "Cincin 1", price: 0, completed: false },
                { id: 29, name: "Cincin 2", price: 0, completed: false },
                { id: 30, name: "Beg", price: 0, completed: false },
                { id: 31, name: "Kek", price: 0, completed: false },
                { id: 32, name: "Beryls Choc", price: 0, completed: false },
                { id: 33, name: "Sejadah", price: 0, completed: false },
                { id: 34, name: "Tasbih", price: 0, completed: false },
                { id: 35, name: "Set Dulang", price: 0, completed: false },
                { id: 36, name: "Bekas Cincin 1", price: 0, completed: false },
                { id: 37, name: "Bekas Cincin 2", price: 0, completed: false },
            ],
            others: [
                { id: 38, name: "Catering", price: 0, completed: false },
                { id: 39, name: "Homestay 1", price: 0, completed: false },
                { id: 40, name: "Homestay 2", price: 0, completed: false },
                { id: 41, name: "Pelamin", price: 0, completed: false },
                { id: 42, name: "Photographer", price: 0, completed: false },
                { id: 43, name: "Board Cermin", price: 0, completed: false },
                { id: 44, name: "Sticker Board", price: 0, completed: false },
                { id: 45, name: "E-Card", price: 0, completed: false },
            ]
        };

        let state = JSON.parse(localStorage.getItem(STORAGE_KEY)) || INITIAL_STATE;

        const categories = [
            { key: 'fifiClothes', title: 'Pakaian Fifi', color: 'bg-pink-500', icon: 'user' },
            { key: 'fifiDulang', title: 'Dulang Fifi', color: 'bg-indigo-500', icon: 'package' },
            { key: 'afiqClothes', title: 'Pakaian Afiq', color: 'bg-blue-600', icon: 'user' },
            { key: 'afiqDulang', title: 'Dulang Afiq', color: 'bg-cyan-600', icon: 'package' },
            { key: 'others', title: 'Lain-Lain', color: 'bg-slate-700', icon: 'truck' }
        ];

        function render() {
            // Update Header Inputs from State
            document.getElementById('event-date').value = state.eventInfo.date;
            document.getElementById('event-pax').value = state.eventInfo.pax;
            document.getElementById('event-theme').value = state.eventInfo.theme;
            document.getElementById('event-dais').value = state.eventInfo.dais;

            const container = document.getElementById('categories-container');
            container.innerHTML = '';
            
            let grandTotal = 0;
            let totalItemsCount = 0;
            let completedItemsCount = 0;

            categories.forEach(cat => {
                const items = state[cat.key];
                const subtotal = items.reduce((acc, item) => acc + item.price, 0);
                const completedCount = items.filter(i => i.completed).length;
                const progress = Math.round((completedCount / items.length) * 100) || 0;

                grandTotal += subtotal;
                totalItemsCount += items.length;
                completedItemsCount += completedCount;

                const section = document.createElement('div');
                section.className = "bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden mb-8 category-card";
                section.innerHTML = `
                    <div class="p-4 ${cat.color} text-white flex justify-between items-center">
                        <div class="flex items-center gap-2">
                            <i data-lucide="${cat.icon}" class="w-5 h-5"></i>
                            <h2 class="font-bold text-lg uppercase tracking-tight">${cat.title}</h2>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] opacity-90 uppercase tracking-wider font-bold">Subtotal</p>
                            <p class="font-mono font-bold">RM ${subtotal.toFixed(2)}</p>
                        </div>
                    </div>
                    <div class="p-1 bg-slate-50">
                        <div class="w-full bg-slate-200 h-1.5">
                            <div class="bg-green-400 h-full transition-all duration-500" style="width: ${progress}%"></div>
                        </div>
                    </div>
                    <div class="divide-y divide-slate-50" id="list-${cat.key}"></div>
                    <div class="p-4 bg-slate-50/50 flex justify-center no-print border-t border-slate-100">
                        <button onclick="addItem('${cat.key}')" class="flex items-center gap-1 text-[10px] font-bold text-slate-500 hover:text-slate-800 transition-colors uppercase tracking-widest">
                            <i data-lucide="plus-circle" class="w-3 h-3"></i> Tambah Item
                        </button>
                    </div>
                `;
                
                container.appendChild(section);
                const listContainer = document.getElementById(`list-${cat.key}`);
                
                items.forEach(item => {
                    const row = document.createElement('div');
                    row.className = `flex items-center p-4 gap-4 transition-colors ${item.completed ? 'bg-green-50/10' : 'hover:bg-slate-50'}`;
                    row.innerHTML = `
                        <button onclick="toggleItem('${cat.key}', ${item.id})" class="flex-shrink-0 transition-colors no-print ${item.completed ? 'text-green-500' : 'text-slate-300'}">
                            <i data-lucide="${item.completed ? 'check-circle-2' : 'circle'}" class="w-6 h-6 ${item.completed ? 'fill-green-500 text-white' : ''}"></i>
                        </button>
                        <div class="pdf-only flex-shrink-0 w-5 h-5 border border-slate-300 rounded flex items-center justify-center">
                            ${item.completed ? '<div class="w-3 h-3 bg-green-500 rounded-sm"></div>' : ''}
                        </div>
                        <div class="flex-1 overflow-hidden">
                            <span class="block truncate font-medium ${item.completed ? 'text-slate-400 line-through' : 'text-slate-700'}">${item.name}</span>
                        </div>
                        <div class="flex items-center gap-2 bg-slate-100/50 rounded-lg px-2 py-1 border border-slate-100 focus-within:border-blue-300 transition-all">
                            <span class="text-slate-400 text-[10px] font-bold">RM</span>
                            <input type="number" value="${item.price || ''}" placeholder="0" onchange="updatePrice('${cat.key}', ${item.id}, this.value)"
                                class="w-16 bg-transparent border-none focus:ring-0 p-0 text-right font-mono font-bold text-slate-700 text-sm">
                        </div>
                        <button onclick="deleteItem('${cat.key}', ${item.id})" class="text-slate-200 hover:text-red-400 transition-colors no-print">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    `;
                    listContainer.appendChild(row);
                });
            });

            document.getElementById('grand-total').innerText = `RM ${grandTotal.toLocaleString(undefined, { minimumFractionDigits: 2 })}`;
            document.getElementById('total-items').innerText = totalItemsCount;
            document.getElementById('completed-items').innerText = completedItemsCount;
            document.getElementById('floating-total').innerText = `RM ${Math.round(grandTotal)}`;
            document.getElementById('floating-progress').innerText = `${Math.round((completedItemsCount / totalItemsCount) * 100) || 0}%`;
            
            lucide.createIcons();
            updateCountdown();
        }

        // Countdown Logic
        function updateCountdown() {
            const target = new Date(state.eventInfo.date).getTime();
            const now = new Date().getTime();
            const diff = target - now;

            if (diff < 0) {
                document.getElementById('cd-days').innerText = "00";
                document.getElementById('cd-hours').innerText = "00";
                document.getElementById('cd-mins').innerText = "00";
                document.getElementById('cd-secs').innerText = "00";
                return;
            }

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const secs = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById('cd-days').innerText = String(days).padStart(2, '0');
            document.getElementById('cd-hours').innerText = String(hours).padStart(2, '0');
            document.getElementById('cd-mins').innerText = String(mins).padStart(2, '0');
            document.getElementById('cd-secs').innerText = String(secs).padStart(2, '0');
        }

        // Sync & Storage
        function setSyncIcon(status) {
            const el = document.getElementById('sync-status');
            if (status === 'syncing') {
                el.innerHTML = `<i data-lucide="save" class="w-3 h-3 mr-2 animate-pulse text-blue-200"></i> Menyimpan...`;
            } else if (status === 'success') {
                el.innerHTML = `<i data-lucide="check" class="w-3 h-3 mr-2 text-green-300"></i> Tersimpan`;
                setTimeout(() => setSyncIcon('idle'), 2000);
            } else {
                el.innerHTML = `<i data-lucide="database" class="w-3 h-3 mr-2"></i> Simpanan Tempatan Aktif`;
            }
            lucide.createIcons();
        }

        function saveToLocal() {
            setSyncIcon('syncing');
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
            setTimeout(() => setSyncIcon('success'), 300);
        }

        // Global Event Handlers
        window.updateEventInfo = (field, val) => {
            state.eventInfo[field] = val;
            saveToLocal();
            if (field === 'date') updateCountdown();
        };

        window.toggleItem = (catKey, id) => {
            state[catKey] = state[catKey].map(i => i.id === id ? {...i, completed: !i.completed} : i);
            saveToLocal();
            render();
        };

        window.updatePrice = (catKey, id, val) => {
            state[catKey] = state[catKey].map(i => i.id === id ? {...i, price: parseFloat(val) || 0} : i);
            saveToLocal();
            render();
        };

        window.addItem = (catKey) => {
            const name = prompt("Nama Item Baru:");
            if (name && name.trim()) {
                state[catKey].push({ id: Date.now(), name: name.trim(), price: 0, completed: false });
                saveToLocal();
                render();
            }
        };

        window.deleteItem = (catKey, id) => {
            if (confirm("Padam item ini?")) {
                state[catKey] = state[catKey].filter(i => i.id !== id);
                saveToLocal();
                render();
            }
        };

        window.resetData = () => {
            if(confirm('Semua harga dan status akan dipadam. Teruskan?')) {
                state = INITIAL_STATE;
                saveToLocal();
                render();
            }
        };

        window.downloadPDF = () => {
            document.body.classList.add('pdf-mode');
            const element = document.body;
            const opt = {
                margin: 5,
                filename: `Planner_Tunang_Afiq_Fifi_${state.eventInfo.date}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save().then(() => {
                document.body.classList.remove('pdf-mode');
            });
        };

        // Start countdown timer
        setInterval(updateCountdown, 1000);
        window.onload = render;
    </script>
</body>
</html>

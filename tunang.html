<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engagement Planner Afiq x Fifi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@500;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #FDFBF7; }
        .font-mono { font-family: 'JetBrains+Mono', monospace; }
        .category-card { transition: all 0.3s ease; }
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .strikethrough { text-decoration: line-through; opacity: 0.5; }
    </style>
</head>
<body class="pb-32">
    <!-- Header -->
    <header class="bg-[#1E3A8A] text-white pt-12 pb-24 px-6 rounded-b-[40px] shadow-xl relative overflow-hidden text-center">
        <div class="absolute top-0 right-0 w-64 h-64 bg-blue-400/10 rounded-full -mr-20 -mt-20 blur-3xl"></div>
        
        <div class="max-w-2xl mx-auto relative z-10">
            <div id="sync-status" class="flex justify-center mb-4 min-h-[24px] text-[10px] uppercase font-bold tracking-widest text-blue-100/50">
                <i data-lucide="database" class="w-3 h-3 mr-2"></i> Simpanan Tempatan Aktif
            </div>

            <div class="inline-flex items-center justify-center p-3 bg-white/10 backdrop-blur-md rounded-full mb-4 border border-white/20">
                <i data-lucide="heart" class="text-pink-400 fill-pink-400 w-6 h-6"></i>
            </div>
            <h1 class="text-3xl font-extrabold tracking-tight mb-2 uppercase">Tunang Afiq & Fifi</h1>
            <div class="flex flex-wrap justify-center gap-3 text-blue-100 text-[12px] font-medium">
                <span class="bg-white/10 px-3 py-1 rounded-full border border-white/10 flex items-center gap-1"><i data-lucide="calendar" class="w-3 h-3"></i> 2027</span>
                <span class="bg-white/10 px-3 py-1 rounded-full border border-white/10 flex items-center gap-1"><i data-lucide="users" class="w-3 h-3"></i> 50 Pax</span>
                <span class="bg-white/10 px-3 py-1 rounded-full border border-white/10">Putih Cream</span>
                <span class="bg-white/10 px-3 py-1 rounded-full border border-white/10">Tema Biru</span>
            </div>
        </div>
    </header>

    <main class="max-w-2xl mx-auto px-4 -mt-12 relative z-20">
        <!-- Stats Card -->
        <div class="bg-white rounded-3xl shadow-xl p-6 border border-slate-100 flex flex-col md:flex-row gap-6 items-center mb-10">
            <div class="flex-1 text-center md:text-left">
                <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest mb-1">Anggaran Keseluruhan</p>
                <h3 id="grand-total" class="text-4xl font-black text-slate-800 font-mono">RM 0.00</h3>
            </div>
            <div class="h-12 w-px bg-slate-100 hidden md:block"></div>
            <div class="flex gap-4">
                <div class="text-center">
                    <div class="w-12 h-12 rounded-xl bg-blue-50 flex items-center justify-center text-blue-600 mb-1 border border-blue-100">
                        <i data-lucide="calculator" class="w-5 h-5"></i>
                    </div>
                    <p class="text-[9px] font-bold text-slate-400 uppercase">Items</p>
                    <p id="total-items" class="font-bold text-slate-700">0</p>
                </div>
                <div class="text-center">
                    <div class="w-12 h-12 rounded-xl bg-green-50 flex items-center justify-center text-green-600 mb-1 border border-green-100">
                        <i data-lucide="check-circle-2" class="w-5 h-5"></i>
                    </div>
                    <p class="text-[9px] font-bold text-slate-400 uppercase">Siap</p>
                    <p id="completed-items" class="font-bold text-slate-700">0</p>
                </div>
            </div>
        </div>

        <!-- Container untuk kategori -->
        <div id="categories-container"></div>

        <div class="text-center py-10 opacity-50">
           <p class="text-xs uppercase tracking-[0.2em] font-bold mb-1">Engagement Planner Offline</p>
           <p class="text-[10px]">Data disimpan dalam pelayar web anda</p>
           <button onclick="resetData()" class="mt-4 text-[10px] text-red-400 hover:text-red-600 underline">Padam Semua Data & Reset</button>
        </div>
    </main>

    <!-- Floating Action Bar -->
    <div class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] max-w-md bg-[#1E3A8A] text-white py-4 px-6 rounded-2xl shadow-2xl flex justify-between items-center z-50 border border-white/20 backdrop-blur-md">
        <div class="flex flex-col">
            <span class="text-[10px] uppercase font-bold opacity-60">Total</span>
            <span id="floating-total" class="text-lg font-mono font-bold leading-none">RM 0</span>
        </div>
        <div class="flex items-center gap-4">
            <div class="text-right">
                <span class="text-[10px] uppercase font-bold opacity-60">Progress</span>
                <p id="floating-progress" class="text-md font-bold leading-none">0%</p>
            </div>
            <div class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center border border-white/20">
                <i data-lucide="wallet" class="w-5 h-5"></i>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'engagement_planner_afiq_fifi_v2';

        const INITIAL_STATE = {
            fifiClothes: [
                { id: Date.now() + 1, name: "Baju Kurung", price: 0, completed: false },
                { id: Date.now() + 2, name: "Veil", price: 0, completed: false },
                { id: Date.now() + 3, name: "Tudung", price: 0, completed: false },
                { id: Date.now() + 4, name: "Heels", price: 0, completed: false },
                { id: Date.now() + 5, name: "Headpiece", price: 0, completed: false },
                { id: Date.now() + 6, name: "Fake Nails + Glue", price: 0, completed: false },
                { id: Date.now() + 7, name: "Inai Putih", price: 0, completed: false },
                { id: Date.now() + 8, name: "Portable Fan", price: 0, completed: false },
                { id: Date.now() + 9, name: "Bunga Tangan", price: 0, completed: false },
                { id: Date.now() + 10, name: "MUA", price: 0, completed: false },
                { id: Date.now() + 11, name: "Hijab Stylist", price: 0, completed: false },
            ],
            fifiDulang: [
                { id: Date.now() + 12, name: "Cincin", price: 0, completed: false },
                { id: Date.now() + 13, name: "Kek 1", price: 0, completed: false },
                { id: Date.now() + 14, name: "Kek 2", price: 0, completed: false },
                { id: Date.now() + 15, name: "Beryls Choc", price: 0, completed: false },
                { id: Date.now() + 16, name: "Beg & Tali Pinggang", price: 0, completed: false },
                { id: Date.now() + 17, name: "Sejadah", price: 0, completed: false },
                { id: Date.now() + 18, name: "Tasbih", price: 0, completed: false },
                { id: Date.now() + 19, name: "Set Kahf", price: 0, completed: false },
                { id: Date.now() + 20, name: "Set Dulang", price: 0, completed: false },
                { id: Date.now() + 21, name: "Bekas Cincin 1", price: 0, completed: false },
                { id: Date.now() + 22, name: "Bekas Cincin 2", price: 0, completed: false },
            ],
            afiqClothes: [
                { id: Date.now() + 23, name: "Kurta", price: 0, completed: false },
                { id: Date.now() + 24, name: "Samping Putih", price: 0, completed: false },
                { id: Date.now() + 25, name: "Seluar Slack", price: 0, completed: false },
                { id: Date.now() + 26, name: "Kasut Hitam", price: 0, completed: false },
                { id: Date.now() + 27, name: "Stokin Hitam", price: 0, completed: false },
            ],
            afiqDulang: [
                { id: Date.now() + 28, name: "Cincin 1", price: 0, completed: false },
                { id: Date.now() + 29, name: "Cincin 2", price: 0, completed: false },
                { id: Date.now() + 30, name: "Beg", price: 0, completed: false },
                { id: Date.now() + 31, name: "Kek", price: 0, completed: false },
                { id: Date.now() + 32, name: "Beryls Choc", price: 0, completed: false },
                { id: Date.now() + 33, name: "Sejadah", price: 0, completed: false },
                { id: Date.now() + 34, name: "Tasbih", price: 0, completed: false },
                { id: Date.now() + 35, name: "Set Dulang", price: 0, completed: false },
                { id: Date.now() + 36, name: "Bekas Cincin 1", price: 0, completed: false },
                { id: Date.now() + 37, name: "Bekas Cincin 2", price: 0, completed: false },
            ],
            others: [
                { id: Date.now() + 38, name: "Catering", price: 0, completed: false },
                { id: Date.now() + 39, name: "Homestay 1", price: 0, completed: false },
                { id: Date.now() + 40, name: "Homestay 2", price: 0, completed: false },
                { id: Date.now() + 41, name: "Pelamin", price: 0, completed: false },
                { id: Date.now() + 42, name: "Photographer", price: 0, completed: false },
                { id: Date.now() + 43, name: "Board Cermin", price: 0, completed: false },
                { id: Date.now() + 44, name: "Sticker Board", price: 0, completed: false },
                { id: Date.now() + 45, name: "E-Card", price: 0, completed: false },
            ]
        };

        let state = JSON.parse(localStorage.getItem(STORAGE_KEY)) || INITIAL_STATE;

        const categories = [
            { key: 'fifiClothes', title: 'Pakaian Fifi', color: 'bg-pink-500', icon: 'user' },
            { key: 'fifiDulang', title: 'Dulang Fifi', color: 'bg-indigo-500', icon: 'package' },
            { key: 'afiqClothes', title: 'Pakaian Afiq', color: 'bg-blue-600', icon: 'user' },
            { key: 'afiqDulang', title: 'Dulang Afiq', color: 'bg-cyan-600', icon: 'package' },
            { key: 'others', title: 'Lain-Lain', color: 'bg-slate-700', icon: 'truck' }
        ];

        function render() {
            const container = document.getElementById('categories-container');
            container.innerHTML = '';
            
            let grandTotal = 0;
            let totalItemsCount = 0;
            let completedItemsCount = 0;

            categories.forEach(cat => {
                const items = state[cat.key];
                const subtotal = items.reduce((acc, item) => acc + item.price, 0);
                const completedCount = items.filter(i => i.completed).length;
                const progress = Math.round((completedCount / items.length) * 100) || 0;

                grandTotal += subtotal;
                totalItemsCount += items.length;
                completedItemsCount += completedCount;

                const section = document.createElement('div');
                section.className = "bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden mb-8 category-card";
                section.innerHTML = `
                    <div class="p-4 ${cat.color} text-white flex justify-between items-center">
                        <div class="flex items-center gap-2">
                            <i data-lucide="${cat.icon}" class="w-5 h-5"></i>
                            <h2 class="font-bold text-lg">${cat.title}</h2>
                        </div>
                        <div class="text-right">
                            <p class="text-xs opacity-90 uppercase tracking-wider">Subtotal</p>
                            <p class="font-mono font-bold">RM ${subtotal.toFixed(2)}</p>
                        </div>
                    </div>
                    <div class="p-1 bg-slate-50">
                        <div class="w-full bg-slate-200 h-1.5">
                            <div class="bg-green-400 h-full transition-all duration-500" style="width: ${progress}%"></div>
                        </div>
                    </div>
                    <div class="divide-y divide-slate-50" id="list-${cat.key}"></div>
                    <div class="p-4 bg-slate-50/50 flex justify-center">
                        <button onclick="addItem('${cat.key}')" class="flex items-center gap-1 text-xs font-bold text-slate-500 hover:text-slate-800 transition-colors uppercase tracking-widest">
                            <i data-lucide="plus-circle" class="w-4 h-4"></i> Tambah Item
                        </button>
                    </div>
                `;
                
                container.appendChild(section);
                const listContainer = document.getElementById(`list-${cat.key}`);
                
                items.forEach(item => {
                    const row = document.createElement('div');
                    row.className = `flex items-center p-4 gap-4 transition-colors ${item.completed ? 'bg-green-50/10' : 'hover:bg-slate-50'}`;
                    row.innerHTML = `
                        <button onclick="toggleItem('${cat.key}', ${item.id})" class="flex-shrink-0 transition-colors ${item.completed ? 'text-green-500' : 'text-slate-300'}">
                            <i data-lucide="${item.completed ? 'check-circle-2' : 'circle'}" class="w-6 h-6 ${item.completed ? 'fill-green-500 text-white' : ''}"></i>
                        </button>
                        <div class="flex-1 overflow-hidden">
                            <span class="block truncate font-medium ${item.completed ? 'text-slate-400 line-through' : 'text-slate-700'}">${item.name}</span>
                        </div>
                        <div class="flex items-center gap-2 bg-slate-100/50 rounded-lg px-2 py-1 border border-slate-100 focus-within:border-blue-300 transition-all">
                            <span class="text-slate-400 text-[10px] font-bold">RM</span>
                            <input type="number" value="${item.price || ''}" placeholder="0" onchange="updatePrice('${cat.key}', ${item.id}, this.value)"
                                class="w-16 bg-transparent border-none focus:ring-0 p-0 text-right font-mono font-bold text-slate-700 text-sm">
                        </div>
                        <button onclick="deleteItem('${cat.key}', ${item.id})" class="text-slate-200 hover:text-red-400 transition-colors">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    `;
                    listContainer.appendChild(row);
                });
            });

            document.getElementById('grand-total').innerText = `RM ${grandTotal.toLocaleString(undefined, { minimumFractionDigits: 2 })}`;
            document.getElementById('total-items').innerText = totalItemsCount;
            document.getElementById('completed-items').innerText = completedItemsCount;
            document.getElementById('floating-total').innerText = `RM ${Math.round(grandTotal)}`;
            document.getElementById('floating-progress').innerText = `${Math.round((completedItemsCount / totalItemsCount) * 100) || 0}%`;
            
            lucide.createIcons();
        }

        function setSyncIcon(status) {
            const el = document.getElementById('sync-status');
            if (status === 'syncing') {
                el.innerHTML = `<i data-lucide="save" class="w-3 h-3 mr-2 animate-pulse text-blue-200"></i> Menyimpan...`;
            } else if (status === 'success') {
                el.innerHTML = `<i data-lucide="check" class="w-3 h-3 mr-2 text-green-300"></i> Tersimpan`;
                setTimeout(() => setSyncIcon('idle'), 2000);
            } else {
                el.innerHTML = `<i data-lucide="database" class="w-3 h-3 mr-2"></i> Simpanan Tempatan Aktif`;
            }
            lucide.createIcons();
        }

        function saveToLocal() {
            setSyncIcon('syncing');
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
            setTimeout(() => setSyncIcon('success'), 300);
        }

        window.toggleItem = (catKey, id) => {
            state[catKey] = state[catKey].map(i => i.id === id ? {...i, completed: !i.completed} : i);
            saveToLocal();
            render();
        };

        window.updatePrice = (catKey, id, val) => {
            state[catKey] = state[catKey].map(i => i.id === id ? {...i, price: parseFloat(val) || 0} : i);
            saveToLocal();
            render();
        };

        window.addItem = (catKey) => {
            const name = prompt("Masukkan nama item baru:");
            if (name && name.trim() !== "") {
                const newItem = {
                    id: Date.now(),
                    name: name.trim(),
                    price: 0,
                    completed: false
                };
                state[catKey].push(newItem);
                saveToLocal();
                render();
            }
        };

        window.deleteItem = (catKey, id) => {
            if (confirm("Adakah anda pasti mahu memadam item ini?")) {
                state[catKey] = state[catKey].filter(i => i.id !== id);
                saveToLocal();
                render();
            }
        };

        window.resetData = () => {
            if(confirm('Adakah anda pasti mahu memadam semua data dan kembali ke senarai asal?')) {
                state = INITIAL_STATE;
                saveToLocal();
                render();
            }
        };

        window.onload = render;
    </script>
</body>
</html>
